<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Mail - For the Brave Heart</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #fffef7;
            --ink: #2c3e50;
            --soft-blue: #b2ebf2;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #e0f7fa 0%, #b2ebf2 100%);
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            touch-action: manipulation; /* Menghilangkan delay sentuhan di HP */
        }

        /* --- Bubble Animation --- */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            filter: blur(1px);
            animation: rise 12s infinite ease-in;
            pointer-events: none;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }

        /* --- Small Fish --- */
        .fish {
            position: absolute;
            font-size: 20px;
            opacity: 0.3;
            pointer-events: none;
        }

        @keyframes swim {
            from { left: -50px; }
            to { left: 110%; }
        }

        /* --- Simple Diary Envelope (No movement on mobile) --- */
        .diary-wrapper {
            z-index: 100;
        }

        .envelope {
            width: 280px;
            height: 180px;
            background: var(--paper);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
            cursor: pointer;
        }

        .envelope h2 { 
            font-family: 'Dancing Script', cursive; 
            color: var(--ink); 
            font-size: 2rem; 
            margin: 0;
        }

        .envelope p { 
            font-size: 10px; 
            color: #94a3b8; 
            letter-spacing: 2px; 
            margin-top: 8px; 
            text-transform: uppercase;
        }

        /* --- Popup Letter --- */
        #message-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80%;
            max-width: 350px;
            background: #ffffff;
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 200;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #message-card.active { transform: translate(-50%, -50%) scale(1); }

        #message-card p {
            line-height: 1.6;
            color: #475569;
            font-size: 1.1rem;
            font-style: italic;
        }

        .close-btn {
            margin-top: 30px;
            background: #b2ebf2;
            color: #2c3e50;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <audio id="bubbleAudio" loop>
        <source src="https://assets.mixkit.co/active_storage/sfx/2281/2281-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Bubbles
        for (let i = 0; i < 12; i++) {
            let b = document.createElement('div');
            b.className = 'bubble';
            let size = Math.random() * 15 + 5 + 'px';
            b.style.width = size;
            b.style.height = size;
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = Math.random() * 8 + 8 + 's';
            b.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(b);
        }

        // Fish
        const icons = ['🐠', '🐟', '✨'];
        for (let i = 0; i < 5; i++) {
            let f = document.createElement('div');
            f.className = 'fish';
            f.innerText = icons[Math.floor(Math.random() * icons.length)];
            f.style.top = Math.random() * 80 + 10 + '%';
            f.style.animation = `swim ${Math.random() * 10 + 15}s infinite linear`;
            document.body.appendChild(f);
        }

        const quotes = [
            "The ocean is big, but your heart is bigger. Stay strong! ✨",
            "Every wave is a reminder of how tough you are. Keep sailing. ⚓",
            "You are doing amazing work out there. We are so proud of you. 🌊",
            "Missing home is hard, but you are carrying so much love with you. 🐚",
            "No matter how far you go, you are always under the same moon. 🌙",
            "The sea is calm because it knows you can handle anything. 🛳️",
            "Take a deep breath. You are safe, you are brave, and you are loved. ✨",
            "One day at a time. Each sunset brings you closer to home. 🌅",
            "You are the star that guides this ship. Keep shining! 🌟",
            "Be kind to yourself today. You are a true hero of the sea. ⚓"
        ];

        function openDiary() {
            const audio = document.getElementById('bubbleAudio');
            audio.volume = 0.2; // Suara gelembung sangat pelan
            audio.play().catch(() => {});

            document.getElementById('quote-text').innerText = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('message-card').classList.add('active');
        }

        function closeDiary(event) {
            event.stopPropagation();
            document.getElementById('message-card').classList.remove('active');
        }
    </script>

    <div class="diary-wrapper">
        <div class="envelope" onclick="openDiary()">
            <div style="font-size: 20px; opacity: 0.3; margin-bottom: 5px;">⚓</div>
            <h2>Sea Mail</h2>
            <p>For the Brave Heart</p>
            <div style="margin-top:10px; opacity: 0.5;">🐚 ✨</div>
        </div>
    </div>

    <div id="message-card">
        <p id="quote-text"></p>
        <button class="close-btn" onclick="closeDiary(event)">Return to the Blue</button>
    </div>

</body>
</html>
