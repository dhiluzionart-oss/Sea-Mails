<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Mail</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #e0f7fa 0%, #b2ebf2 100%);
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
        }

        /* Moving background elements (Only these move) */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: rise 15s infinite ease-in;
            pointer-events: none;
        }
        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }

        .fish {
            position: absolute;
            font-size: 20px;
            opacity: 0.3;
            pointer-events: none;
            animation: swim 20s infinite linear;
        }
        @keyframes swim {
            from { left: -50px; }
            to { left: 110%; }
        }

        /* THE LETTER - Completely Static */
        .envelope {
            width: 280px;
            height: 180px;
            background: #fffef7;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            z-index: 10;
        }

        .envelope h2 { 
            font-family: 'Dancing Script', cursive; 
            color: #2c3e50; 
            font-size: 2rem; 
            margin: 0;
        }

        .envelope p { 
            font-size: 10px; 
            color: #94a3b8; 
            letter-spacing: 2px; 
            margin-top: 8px; 
            text-transform: uppercase;
        }

        /* THE MESSAGE - Only shows on click */
        #message-card {
            display: none; /* Hidden by default */
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 350px;
            background: #ffffff;
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 20;
        }

        #message-card p {
            line-height: 1.8;
            color: #475569;
            font-size: 1.1rem;
            font-style: italic;
        }

        .close-btn {
            margin-top: 30px;
            background: #b2ebf2;
            color: #2c3e50;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <script>
        for (let i = 0; i < 10; i++) {
            let b = document.createElement('div');
            b.className = 'bubble';
            let size = Math.random() * 15 + 5 + 'px';
            b.style.width = size; b.style.height = size;
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = Math.random() * 5 + 10 + 's';
            document.body.appendChild(b);
        }

        const icons = ['🐠', '🐟', '✨'];
        for (let i = 0; i < 5; i++) {
            let f = document.createElement('div');
            f.className = 'fish';
            f.innerText = icons[Math.floor(Math.random() * icons.length)];
            f.style.top = Math.random() * 80 + 10 + '%';
            f.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(f);
        }
    </script>

    <div class="envelope" onclick="openLetter()">
        <div style="font-size: 20px; opacity: 0.3; margin-bottom: 5px;">⚓</div>
        <h2>Sea Mail</h2>
        <p>For the Brave Heart</p>
        <div style="margin-top:10px; opacity: 0.5;">🐚 ✨</div>
    </div>

    <div id="message-card">
        <p id="quote-text"></p>
        <button class="close-btn" onclick="closeLetter()">Sail on, brave heart!</button>
    </div>

    <script>
        const quotes = [
            "The ocean is vast, but your heart is brave enough to cross it. ✨",
            "Keep going, brave heart. Every wave brings you closer home. ⚓",
            "You are doing something incredible. Be proud of yourself. 🌊",
            "Missing home is just love traveling across the water. 🐚",
            "The same moon shines on you and everyone you love. 🌙",
            "Stay steady and calm. You are stronger than the tides. 🛳️",
            "You are a hero of the sea. May your journey be beautiful. ✨",
            "Every sunset at sea is a masterpiece painted for you. 🌅",
            "You are the light of this ship. Keep shining bright! 🌟",
            "One day at a time. You are much stronger than you think. ⚓"
        ];

        function openLetter() {
            document.getElementById('quote-text').innerText = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('message-card').style.display = 'block';
        }

        function closeLetter() {
            document.getElementById('message-card').style.display = 'none';
        }
    </script>
</body>
</html>
